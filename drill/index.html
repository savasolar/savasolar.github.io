<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000000;
            color: #ffffff;
            font-family: Arial;
            overflow: hidden;
        }

        button {
            background-color: #000000;
            width: 44px;
            height: 44px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: none;
        }
        button:hover {
            background-color: #333333;
        }
        button:active {
            background-color: #000000;
        }
        button.moded {
            background-color: #333333;
        }

        #header {
            height: 120px;
            width: 100%;
            background: #000000;
            padding: 8px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #titleBox {
            font-family: Arial;
            font-size: 24px;
            font-weight: bold;
            width: 400px;
            height: 40px;
            background-color: #000000;
            color: white;
            outline-color: #ffffff;
            border: none;
        }

        #speedLabel {
            height: 44px;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-right: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .divider {
            width: 2px;
            height: 44px;
            margin-right: 8px;
            background-color: #333333;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .top-row {
            display: flex;
            align-items: left;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .top-row h1 {
            margin: 0;
            font-size: 18px;
            font-weight: normal;
        }

        .bottom-row {
            display: flex;
            align-items: left;
            margin-top: 8px;
        }

        #timeline {
            width: 100%;
            height: calc(100vh - 120px);
            position: relative;
            background: #000000;
        }

        /* ── Playback slider strip ── */
        #slider-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            display: block;
            cursor: pointer;
            z-index: 20;
        }

        /* ── Waveform sits 20px below the slider ── */
        #waveform {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: calc(100% - 20px);
            display: block;
        }

        /* ── Playhead vertical line through the waveform ── */
        #playhead-canvas {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: calc(100% - 20px);
            pointer-events: none;
            z-index: 15;
            display: block;
        }

        #chops {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: calc(100% - 20px);
            pointer-events: none;
            z-index: 10;
        }

        /* ── Isolation overlay: sits above chops, below playhead ── */
        #isolation-canvas {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: calc(100% - 20px);
            pointer-events: none;
            z-index: 12;
            display: block;
        }

        /* ── Hover overlay: sits above isolation, below playhead ── */
        #hover-canvas {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: calc(100% - 20px);
            pointer-events: none;
            z-index: 13;
            display: block;
        }

        .chop-line {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #333333 0px 2px,
                black 2px 4px
            );
            transform: translateX(-50%);
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="top-row">
            <input type="text" id="titleBox" value="Untitled drill" onfocus="this.select()" onkeydown="if(event.key==='Enter') this.blur()"/>
        </div>

        <div class="bottom-row">
            <button id="playPause" onclick="togglePlayPause()"><svg width="44" height="44"><use href="#playIcon"></use></svg></button>
            <button onclick="stop()"><svg width="44" height="44"><use href="#stopIcon"></use></svg></button>
            <button id="loop" onclick="toggleLoop()"><svg width="44" height="44"><use href="#loopOffIcon"></use></svg></button>
            <div class="divider"></div>
            <button id="pointerButton" onclick="setMode('pointer')"><svg width="44" height="44"><use href="#pointerIcon"></use></svg></button>
            <button id="scissorsButton" onclick="setMode('scissors')"><svg width="44" height="44"><use href="#scissorsIcon"></use></svg></button>
            <button onclick="resetChops()"><svg width="44" height="44"><use href="#resetIcon"></use></svg></button>
            <div class="divider"></div>
            <button onclick="slowDown()"><svg width="44" height="44"><use href="#arrowLeftIcon"></use></svg></button>
            <div id="speedLabel">1.00</div>
            <button onclick="speedUp()"><svg width="44" height="44"><use href="#arrowRightIcon"></use></svg></button>
            <div class="divider"></div>
            <button onclick="document.getElementById('mp3-input').click()"><svg width="44" height="44"><use href="#newIcon"></use></svg></button>
            <button onclick="saveDrill()"><svg width="44" height="44"><use href="#saveIcon"></use></svg></button>
            <button onclick="document.getElementById('drill-input').click()"><svg width="44" height="44"><use href="#loadIcon"></use></svg></button>
        </div>
    </div>

    <div id="timeline">
        <div id="upload-hint" onclick="document.getElementById('mp3-input').click()" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:16px; color:#ffffff; cursor:pointer; z-index:100;">Upload a .mp3 file</div>
        <canvas id="slider-canvas"></canvas>
        <canvas id="waveform"></canvas>
        <canvas id="playhead-canvas"></canvas>
        <canvas id="isolation-canvas"></canvas>
        <canvas id="hover-canvas"></canvas>
        <div id="chops"></div>
    </div>

    <!-- Hidden audio element for playback -->
    <audio id="audio" preload="auto"></audio>

    <input type="file" id="mp3-input" accept="audio/mpeg,audio/mp3" class="hidden-input">
    <input type="file" id="drill-input" accept=".drl" class="hidden-input">

    <script>
        // ── Core state ──────────────────────────────────────────────────────────
        let duration       = 0;
        let currentFileName = '';
        let timestamps     = [];
        let currentMode    = 'pointer';
        let audioContext   = null;
        let audioBufferCache = null;
        let mp3ArrayBuffer = null;
        let speed          = 1.0;
        let loopEnabled    = false;
        let objectURL      = null;   // for revoking old blob URLs

        // Slider drag state
        let isDraggingSlider = false;

        // ── Isolation context state ─────────────────────────────────────────────
        // null = no isolation; a number = index into the segments array of the
        // currently-isolated segment (0 = before first chop, 1 = between chops 1&2, etc.)
        let isolatedSegmentIndex = null;

        // ── DOM refs ────────────────────────────────────────────────────────────
        const audio          = document.getElementById('audio');
        const waveCanvas     = document.getElementById('waveform');
        const sliderCanvas   = document.getElementById('slider-canvas');
        const chopsContainer = document.getElementById('chops');
        const playheadCanvas = document.getElementById('playhead-canvas');
        const isolationCanvas = document.getElementById('isolation-canvas');
        const hoverCanvas     = document.getElementById('hover-canvas');
        const pCtx           = playheadCanvas.getContext('2d');
        const ctx            = waveCanvas.getContext('2d', { alpha: false });
        const sCtx           = sliderCanvas.getContext('2d');
        const iCtx           = isolationCanvas.getContext('2d');
        const hCtx           = hoverCanvas.getContext('2d');

        // ── Playback controls ───────────────────────────────────────────────────
        function togglePlayPause() {
            if (!duration) return;
            if (audio.paused) {
                audio.play();
                document.getElementById('playPause').querySelector('use').setAttribute('href', '#pauseIcon');
            } else {
                audio.pause();
                document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');
            }
        }

        function togglePlayStop() {
            if (!duration) return;
            if (audio.paused) {
                audio.play();
                document.getElementById('playPause').querySelector('use').setAttribute('href', '#pauseIcon');
            } else {
                stop();
            }
        }

        function stop() {
            audio.pause();
            // When isolated, "stop" means return to the segment start, not the track start.
            if (isolatedSegmentIndex !== null) {
                const segs = getSegments();
                audio.currentTime = segs[isolatedSegmentIndex][0];
            } else {
                audio.currentTime = 0;
            }
            document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');
            updatePlayhead();
        }

        function toggleLoop() {
            loopEnabled = !loopEnabled;
            audio.loop   = loopEnabled;
            document.getElementById('loop').querySelector('use').setAttribute('href', loopEnabled ? '#loopOnIcon' : '#loopOffIcon');
        }

        function slowDown() {
            speed = Math.max(0.25, parseFloat((speed - 0.25).toFixed(2)));
            audio.playbackRate = speed;
            document.getElementById('speedLabel').textContent = speed.toFixed(2);
        }

        function speedUp() {
//            speed = Math.min(4.0, parseFloat((speed + 0.25).toFixed(2)));
            speed = Math.min(2.0, parseFloat((speed + 0.25).toFixed(2)));
            audio.playbackRate = speed;
            document.getElementById('speedLabel').textContent = speed.toFixed(2);
        }

        // ── Playhead rendering ──────────────────────────────────────────────────
        function getPlayheadX() {
            if (!duration) return 0;
            return (audio.currentTime / duration) * sliderCanvas.width;
        }

        function drawSlider() {
            const w = sliderCanvas.width;
            const h = sliderCanvas.height;
            const x = getPlayheadX();

            // Green background
            sCtx.fillStyle = '#000000';
            sCtx.fillRect(0, 0, w, h);

            // Blue dotted line: 2×2 px dots starting at (0, 1), 2px gaps, spanning full width
            sCtx.fillStyle = '#333333';
            for (let x = 0; x < w; x += 4) {   // step = dot width (2) + gap (2)
                sCtx.fillRect(x, 1, 2, 2);
            }
            for (let x = 2; x < w; x += 4) {   // step = dot width (2) + gap (2)
                sCtx.fillRect(x, 5, 2, 2);
            }
            for (let x = 0; x < w; x += 4) {   // step = dot width (2) + gap (2)
                sCtx.fillRect(x, 9, 2, 2);
            }
            for (let x = 2; x < w; x += 4) {   // step = dot width (2) + gap (2)
                sCtx.fillRect(x, 13, 2, 2);
            }
            for (let x = 0; x < w; x += 4) {   // step = dot width (2) + gap (2)
                sCtx.fillRect(x, 17, 2, 2);
            }

            // White triangle blip (pointing down like a playhead)
            const triH  = 20;
            const triW  = 20;
            sCtx.fillStyle = '#ffffff';
            sCtx.beginPath();
            sCtx.moveTo(x,          0);          // top centre
            sCtx.lineTo(x - triW/2, 0);          // top left
            sCtx.lineTo(x,          0 + triH);   // bottom point
            sCtx.lineTo(x + triW/2, 0);          // top right
            sCtx.closePath();
            sCtx.fill();
            // Flatten the bottom by 2px with a 2x2 square
            sCtx.fillRect(x - 1, triH - 2, 2, 2);
        }

        function updatePlayhead() {
            const x = getPlayheadX();

            // Draw white line on the transparent overlay canvas
            pCtx.clearRect(0, 0, playheadCanvas.width, playheadCanvas.height);
            pCtx.fillStyle = '#ffffff';
            pCtx.fillRect(Math.round(x) - 1, 0, 2, playheadCanvas.height);

            drawSlider();
        }

        // Runs every animation frame while audio is playing or when seeking
        function animationLoop() {
            updatePlayhead();
            requestAnimationFrame(animationLoop);
        }

        // ── Slider interaction ──────────────────────────────────────────────────
        function seekToX(x) {
            if (!duration) return;
            const clamped = Math.max(0, Math.min(x, sliderCanvas.width));
            const t = (clamped / sliderCanvas.width) * duration;
            audio.currentTime = t;
            updatePlayhead();
        }

        sliderCanvas.addEventListener('mousedown', e => {
            isDraggingSlider = true;
            seekToX(e.offsetX);
        });

        window.addEventListener('mousemove', e => {
            if (!isDraggingSlider) return;
            const rect = sliderCanvas.getBoundingClientRect();
            seekToX(e.clientX - rect.left);
        });

        window.addEventListener('mouseup', () => {
            isDraggingSlider = false;
        });

        // Touch support for slider
        sliderCanvas.addEventListener('touchstart', e => {
            isDraggingSlider = true;
            const rect = sliderCanvas.getBoundingClientRect();
            seekToX(e.touches[0].clientX - rect.left);
        }, { passive: true });

        window.addEventListener('touchmove', e => {
            if (!isDraggingSlider) return;
            const rect = sliderCanvas.getBoundingClientRect();
            seekToX(e.touches[0].clientX - rect.left);
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDraggingSlider = false;
        });

        // ── Waveform ────────────────────────────────────────────────────────────
        function redrawChops() {
            chopsContainer.innerHTML = '';
            timestamps.forEach(ts => {
                const perc = (ts / duration) * 100;
                const line = document.createElement('div');
                line.className = 'chop-line';
                line.style.left = `${perc}%`;
                chopsContainer.appendChild(line);
            });
        }

        function drawWaveform(audioBuffer) {
            const w       = waveCanvas.width;
            const h       = waveCanvas.height;
            const centerY = h / 2;
            const halfH   = h / 2;

            ctx.fillStyle = '#000000';  // background color, was B64E84
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = '#696969';  // foreground color, was 24101A
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(w, centerY);
            ctx.stroke();

            const data           = audioBuffer.getChannelData(0);
            const samplesPerPixel = Math.max(1, Math.floor(data.length / w));

            ctx.strokeStyle = '#696969';  // foreground color, was 24101A
            ctx.lineWidth   = 1.5;
            ctx.beginPath();

            for (let x = 0; x < w; x++) {
                let minVal = 0, maxVal = 0;
                const start = Math.floor(x * samplesPerPixel);
                for (let i = 0; i < samplesPerPixel && (start + i) < data.length; i++) {
                    const val = data[start + i];
                    if (val < minVal) minVal = val;
                    if (val > maxVal) maxVal = val;
                }
                ctx.moveTo(x, centerY - (maxVal * halfH));
                ctx.lineTo(x, centerY - (minVal * halfH));
            }
            ctx.stroke();
        }

        function resizeCanvas() {
            const timeline = document.getElementById('timeline');

            sliderCanvas.width  = Math.floor(timeline.clientWidth);
            sliderCanvas.height = 20;

            waveCanvas.width  = Math.floor(timeline.clientWidth);
            waveCanvas.height = Math.floor(timeline.clientHeight) - 20;

            playheadCanvas.width  = waveCanvas.width;
            playheadCanvas.height = waveCanvas.height;

            // Keep the isolation and hover canvases in sync with the waveform size
            isolationCanvas.width  = waveCanvas.width;
            isolationCanvas.height = waveCanvas.height;
            hoverCanvas.width      = waveCanvas.width;
            hoverCanvas.height     = waveCanvas.height;

            if (audioBufferCache) {
                drawWaveform(audioBufferCache);
            } else {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
            }

            updatePlayhead();
            redrawChops();
            // Redraw isolation overlay at the new size (hover clears naturally on resize)
            drawIsolationOverlay();
        }

        // ── Project management ──────────────────────────────────────────────────
        /*function resetProject() {
            timestamps       = [];
            mp3ArrayBuffer   = null;
            audioBufferCache = null;
            duration         = 0;
            currentFileName  = '';
            chopsContainer.innerHTML = '';

            audio.pause();
            audio.src = '';
            if (objectURL) { URL.revokeObjectURL(objectURL); objectURL = null; }

            document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');

            if (waveCanvas.width > 0 && waveCanvas.height > 0) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
            }
            updatePlayhead();
        }*/

        function resetProject() {
            timestamps       = [];
            mp3ArrayBuffer   = null;
            audioBufferCache = null;
            duration         = 0;
            currentFileName  = '';
            speed            = 1.0;
            loopEnabled      = false;
            isolatedSegmentIndex = null;
            chopsContainer.innerHTML = '';

            audio.pause();
            audio.src        = '';
            audio.loop       = false;
            audio.playbackRate = 1.0;
            audio.removeEventListener('timeupdate', _isolationTimeUpdate);
            if (objectURL) { URL.revokeObjectURL(objectURL); objectURL = null; }

            document.getElementById('titleBox').value = 'Untitled drill';
            document.getElementById('speedLabel').textContent = '1.00';
            document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');
            document.getElementById('loop').querySelector('use').setAttribute('href', '#loopOffIcon');

            drawIsolationOverlay();
            drawHoverOverlay(null);
            document.getElementById('upload-hint').style.display = 'block';

            if (waveCanvas.width > 0 && waveCanvas.height > 0) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
            }
            updatePlayhead();
        }

        async function loadMP3(file) {
            resetProject();
            if (!file) return;

            currentFileName = file.name;

            try {
                // ── Web Audio path (waveform) ──
                const arrayBuffer = await file.arrayBuffer();
                mp3ArrayBuffer    = arrayBuffer;

                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();

                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
                duration          = audioBuffer.duration;
                audioBufferCache  = audioBuffer;

                resizeCanvas();
                document.getElementById('upload-hint').style.display = 'none';

                // ── HTML Audio path (playback) ──
                objectURL  = URL.createObjectURL(file);
                audio.src  = objectURL;
                audio.playbackRate = speed;
                audio.loop = loopEnabled;
                await audio.load();

            } catch (e) {
                console.error(e);
                alert('Invalid MP3 file');
            }
        }

        // ── Save / Load .drl ──────────────────────────────────────────────────
        function saveDrill() {
            if (!mp3ArrayBuffer) { alert('No project loaded.'); return; }

            const base64 = btoa(
                new Uint8Array(mp3ArrayBuffer).reduce((d, b) => d + String.fromCharCode(b), '')
            );

            const payload = JSON.stringify({
                version:      1,
                fileName:     document.getElementById('titleBox').value,
                loop:         loopEnabled,
                speed:        speed,
                mode:         currentMode,
                timestamps:   timestamps,
                mp3Base64:    base64
            });

            const blob = new Blob([payload], { type: 'application/octet-stream' });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
//            a.download = (currentFileName.replace(/\.mp3$/i, '') || 'project') + '.drl';
            a.download = (document.getElementById('titleBox').value.trim() || 'project') + '.drl';
            a.click();
        }

        async function loadDrill(file) {
            if (!file) return;
            try {
                const text    = await file.text();
                const data    = JSON.parse(text);

                resetProject();

                loopEnabled     = data.loop    ?? false;
                speed           = data.speed   ?? 1.0;
                currentMode     = data.mode    ?? 'pointer';
                timestamps      = data.timestamps ?? [];
                currentFileName = data.fileName  ?? '';

                document.getElementById('titleBox').value = data.fileName ?? 'Untitled drill';
                document.getElementById('loop').querySelector('use').setAttribute('href', loopEnabled ? '#loopOnIcon' : '#loopOffIcon');
                document.getElementById('speedLabel').textContent  = speed.toFixed(2);
                setMode(currentMode);

                // Decode base64 → ArrayBuffer
                const binary = atob(data.mp3Base64);
                const bytes  = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                mp3ArrayBuffer = bytes.buffer;

                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioContext.decodeAudioData(mp3ArrayBuffer.slice(0));
                duration         = audioBuffer.duration;
                audioBufferCache = audioBuffer;

                resizeCanvas();
                document.getElementById('upload-hint').style.display = 'none';

                const blob = new Blob([bytes], { type: 'audio/mpeg' });
                objectURL        = URL.createObjectURL(blob);
                audio.src        = objectURL;
                // audio.playbackRate = speed;
                audio.loop       = loopEnabled;
                await audio.load();
                audio.playbackRate = speed;

            } catch (e) {
                console.error(e);
                alert('Failed to load .drill file.');
            }
        }

        // ── Isolation helpers ────────────────────────────────────────────────────

        // Returns an array of [startTime, endTime] pairs for every segment between
        // chop lines (including the implicit 0 and duration boundaries).
        function getSegments() {
            if (!duration) return [];
            const bounds = [0, ...timestamps, duration];
            const segs = [];
            for (let i = 0; i < bounds.length - 1; i++) {
                segs.push([bounds[i], bounds[i + 1]]);
            }
            return segs;
        }

        // Returns the segment index (into getSegments()) that contains the given
        // x pixel position on the waveform canvas, or -1 if duration is 0.
        function segmentIndexAtX(x) {
            if (!duration) return -1;
            const t = (x / waveCanvas.width) * duration;
            const segs = getSegments();
            for (let i = 0; i < segs.length; i++) {
                if (t >= segs[i][0] && t <= segs[i][1]) return i;
            }
            return segs.length - 1; // clamp to last segment
        }

        // Draws the isolation overlay: black 50%-opaque rects over every segment
        // except the isolated one. Clears completely when isolatedSegmentIndex is null.
        function drawIsolationOverlay() {
            iCtx.clearRect(0, 0, isolationCanvas.width, isolationCanvas.height);
            if (isolatedSegmentIndex === null) return;

            const segs = getSegments();
            iCtx.fillStyle = 'rgba(0, 0, 0, 1.0)';
            segs.forEach(([start, end], i) => {
                if (i === isolatedSegmentIndex) return; // leave the active segment clear
                const x1 = (start / duration) * isolationCanvas.width;
                const x2 = (end   / duration) * isolationCanvas.width;
                iCtx.fillRect(x1, 0, x2 - x1, isolationCanvas.height);
            });
        }

        // Draws a white 50%-opaque hover highlight over the segment at the given
        // index, or clears if idx is null.
        function drawHoverOverlay(idx) {
            hCtx.clearRect(0, 0, hoverCanvas.width, hoverCanvas.height);
            if (idx === null || !duration) return;

            const segs = getSegments();
            if (idx < 0 || idx >= segs.length) return;
            const [start, end] = segs[idx];
            const x1 = (start / duration) * hoverCanvas.width;
            const x2 = (end   / duration) * hoverCanvas.width;
            hCtx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            hCtx.fillRect(x1, 0, x2 - x1, hoverCanvas.height);
        }

        // Applies the isolation context to the audio element: seeks to the segment
        // start and installs the boundary-enforcement listener.
        // IMPORTANT: native audio.loop must be OFF during isolation — if it were on,
        // the browser would jump to absolute 0 at track end before our timeupdate
        // handler can redirect to the segment start. We handle looping ourselves.
        function applyIsolationToAudio() {
            if (isolatedSegmentIndex === null) {
                // Restore native loop behaviour and remove our boundary listener.
                audio.loop = loopEnabled;
                audio.removeEventListener('timeupdate', _isolationTimeUpdate);
                return;
            }
            const segs = getSegments();
            const [start] = segs[isolatedSegmentIndex];
            // Disable native looping — _isolationTimeUpdate handles it instead.
            audio.loop = false;
            audio.currentTime = start;
            // Remove any stale listener before adding a fresh one.
            audio.removeEventListener('timeupdate', _isolationTimeUpdate);
            audio.addEventListener('timeupdate', _isolationTimeUpdate);
        }

        // Listener that loops/stops playback at the segment end boundary.
        function _isolationTimeUpdate() {
            if (isolatedSegmentIndex === null) return;
            const segs = getSegments();
            const [start, end] = segs[isolatedSegmentIndex];
            if (audio.currentTime >= end) {
                if (loopEnabled) {
                    audio.currentTime = start;
                } else {
                    audio.pause();
                    audio.currentTime = start;
                    document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');
                }
            }
        }

        // ── Scissors / chops ────────────────────────────────────────────────────
        function handleClick(e) {
            // ── Scissors mode: place a chop line ──
            if (currentMode === 'scissors') {
                if (duration === 0) return;
                const perc = e.offsetX / waveCanvas.width;
                const ts   = perc * duration;
                timestamps.push(ts);
                timestamps.sort((a, b) => a - b);
                redrawChops();
                return;
            }

            // ── Pointer mode: toggle isolation context ──
            if (currentMode === 'pointer') {
                if (duration === 0) return;
                const clickedIndex = segmentIndexAtX(e.offsetX);

                if (isolatedSegmentIndex !== null) {
                    // Any click in pointer mode while isolated → clear isolation
                    isolatedSegmentIndex = null;
                    applyIsolationToAudio(); // restores audio.loop and removes listener
                    drawIsolationOverlay();
                } else {
                    // Enter isolation for the clicked segment
                    isolatedSegmentIndex = clickedIndex;
                    drawIsolationOverlay();
                    applyIsolationToAudio();
                }
            }
        }

        function setMode(mode) {
            currentMode  = mode;
            waveCanvas.style.cursor = mode === 'scissors' ? 'crosshair' : 'default';
            document.getElementById('pointerButton').classList.toggle('moded',  mode === 'pointer');
            document.getElementById('scissorsButton').classList.toggle('moded', mode === 'scissors');

            // Switching to scissors always clears any active isolation context
            if (mode === 'scissors' && isolatedSegmentIndex !== null) {
                isolatedSegmentIndex = null;
                applyIsolationToAudio(); // restores audio.loop and removes listener
                drawIsolationOverlay();
            }
        }

        function resetChops() {
            if (timestamps.length === 0) return;
            timestamps = [];
            // Resetting chops invalidates any active isolation context
            isolatedSegmentIndex = null;
            applyIsolationToAudio(); // restores audio.loop and removes listener
            drawIsolationOverlay();
            redrawChops();
        }

        // ── Audio events ────────────────────────────────────────────────────────
        audio.addEventListener('ended', () => {
            if (!loopEnabled) {
                document.getElementById('playPause').querySelector('use').setAttribute('href', '#playIcon');
            }
        });

        // ── Init ────────────────────────────────────────────────────────────────
        function init() {
            document.getElementById('mp3-input').addEventListener('change', e => {
                if (e.target.files[0]) loadMP3(e.target.files[0]);
            });
            document.getElementById('drill-input').addEventListener('change', e => {
                if (e.target.files[0]) loadDrill(e.target.files[0]);
            });

            waveCanvas.addEventListener('click', handleClick);

            // ── Isolation hover highlight ──
            // Show a white 50%-opaque rectangle over the hovered segment in pointer mode.
            waveCanvas.addEventListener('mousemove', e => {
                if (currentMode !== 'pointer' || !duration) {
                    drawHoverOverlay(null);
                    return;
                }
                drawHoverOverlay(segmentIndexAtX(e.offsetX));
            });
            waveCanvas.addEventListener('mouseleave', () => drawHoverOverlay(null));

            window.addEventListener('resize', resizeCanvas);

            document.addEventListener('keydown', e => {
                if (e.code === 'Space' && document.activeElement.id !== 'titleBox') {
                    e.preventDefault();
                    togglePlayStop();
                }
            });

            setMode('pointer');
            resizeCanvas();

            // Kick off the animation loop
            requestAnimationFrame(animationLoop);
        }



        window.onload = init;
    </script>
